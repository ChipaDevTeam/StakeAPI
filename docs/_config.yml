title: StakeAPI Documentation
description: "The most powerful unofficial Python API wrapper for Stake.com — Casino, Sports Betting, and Account Management."
baseurl: "/StakeAPI"
url: ""

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

permalink: pretty

aux_links:
  "Get Started on Stake.com":
    - "https://stake.com/?c=WY7953wQ"
  "Discord":
    - "https://discord.gg/PHHfh6UyCb"
  "GitHub":
    - "https://github.com/chipadevteam/StakeAPI"

aux_links_new_tab: true

heading_anchors: true

nav_sort: case_insensitive

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/

callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

footer_content: '<a href="https://stake.com/?c=WY7953wQ" target="_blank" rel="noopener">Sign up on Stake.com</a> and start building with StakeAPI today. | <a href="https://discord.gg/PHHfh6UyCb" target="_blank" rel="noopener">Join our Discord</a> &copy; 2024-2026 StakeAPI Contributors.'

back_to_top: true
back_to_top_text: "Back to top"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

ga_tracking: null
ga_tracking_anonymize_ip: true
